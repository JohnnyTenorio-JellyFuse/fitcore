<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitCore — AI Fitness OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ── Sidebar (Desktop) ─────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-text">FitCore</div>
      <div class="logo-sub">AI FITNESS OS</div>
    </div>
    <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </div>
    <div class="nav-item" id="nav-nutrition" onclick="navigate('nutrition')">
      <span class="nav-icon">🥗</span><span>Nutrition</span>
    </div>
    <div class="nav-item" id="nav-workouts" onclick="navigate('workouts')">
      <span class="nav-icon">💪</span><span>Workouts</span>
    </div>
    <div class="nav-item" id="nav-progress" onclick="navigate('progress')">
      <span class="nav-icon">📈</span><span>Progress</span>
    </div>
    <div class="nav-item" id="nav-shop" onclick="navigate('shop')">
      <span class="nav-icon">🛒</span>
      <span>Shop</span>
      <span id="cart-badge" style="display:none;margin-left:auto;background:#ef4444;color:#fff;border-radius:999px;font-size:9px;font-weight:700;padding:2px 6px"></span>
    </div>
    <div class="nav-item" id="nav-profile" onclick="navigate('profile')">
      <span class="nav-icon">👤</span><span>Profile</span>
    </div>
    <div style="margin-top:auto;padding:20px;border-top:1px solid #2a2a2a">
      <div style="font-size:11px;color:#666;font-family:'DM Mono',monospace">STREAK</div>
      <div id="streak-val" style="font-size:20px;margin-top:4px">🔥 0 days</div>
    </div>
  </nav>

  <!-- ── Main Content ──────────────────────────────────────────── -->
  <main class="main" id="main-content">
    <!-- Rendered by app.js -->
  </main>

  <!-- ── Bottom Nav (Mobile) ───────────────────────────────────── -->
  <nav class="bottom-nav">
    <div class="bottom-nav-item active" id="bnav-dashboard" onclick="navigate('dashboard')">
      <span class="bnav-icon">📊</span><span>Home</span>
    </div>
    <div class="bottom-nav-item" id="bnav-nutrition" onclick="navigate('nutrition')">
      <span class="bnav-icon">🥗</span><span>Food</span>
    </div>
    <div class="bottom-nav-item" id="bnav-workouts" onclick="navigate('workouts')">
      <span class="bnav-icon">💪</span><span>Train</span>
    </div>
    <div class="bottom-nav-item" id="bnav-progress" onclick="navigate('progress')">
      <span class="bnav-icon">📈</span><span>Stats</span>
    </div>
    <div class="bottom-nav-item" id="bnav-shop" onclick="navigate('shop')">
      <span class="bnav-icon">🛒</span><span>Shop</span>
    </div>
    <div class="bottom-nav-item" id="bnav-profile" onclick="navigate('profile')">
      <span class="bnav-icon">👤</span><span>Profile</span>
    </div>
  </nav>

  <!-- ── Profile Setup Modal ───────────────────────────────────── -->
  <div class="modal-overlay" id="modal" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal-body"><!-- rendered by JS --></div>
  </div>

  <!-- ── Toast Notification ────────────────────────────────────── -->
  <div class="notification" id="notification" style="display:none"></div>

</div>
<script src="app.js"></script>
</body>
</html>
